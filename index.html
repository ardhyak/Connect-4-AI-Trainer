const {useState,useEffect,useRef,useMemo,useCallback}=React;

/* ═══ LOCALSTORAGE HELPERS ═══ */
const LS_KEY='c4coach_v2';
const loadLS=()=>{try{return JSON.parse(localStorage.getItem(LS_KEY))||{};}catch(e){return{};}};
const saveLS=(data)=>{try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch(e){}};
const lsData=loadLS();

/* ═══ ENGINE ═══ */
const R=6,C=7,E=0,P=1,AI=2;
const mkB=()=>Array.from({length:R},()=>Array(C).fill(E));
const cl=b=>b.map(r=>[...r]);
const validM=b=>{const m=[];for(let c=0;c<C;c++)if(b[0][c]===E)m.push(c);return m};
const dropR=(b,c)=>{for(let r=R-1;r>=0;r--)if(b[r][c]===E)return r;return-1};
const drop=(b,c,p)=>{const n=cl(b),r=dropR(b,c);if(r<0)return null;n[r][c]=p;return n};
const checkWin=(b,p)=>{for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(b[r][c]!==p)continue;if(c+3<C&&b[r][c+1]===p&&b[r][c+2]===p&&b[r][c+3]===p)return[[r,c],[r,c+1],[r,c+2],[r,c+3]];if(r+3<R&&b[r+1][c]===p&&b[r+2][c]===p&&b[r+3][c]===p)return[[r,c],[r+1,c],[r+2,c],[r+3,c]];if(r+3<R&&c+3<C&&b[r+1][c+1]===p&&b[r+2][c+2]===p&&b[r+3][c+3]===p)return[[r,c],[r+1,c+1],[r+2,c+2],[r+3,c+3]];if(r+3<R&&c-3>=0&&b[r+1][c-1]===p&&b[r+2][c-2]===p&&b[r+3][c-3]===p)return[[r,c],[r+1,c-1],[r+2,c-2],[r+3,c-3]];}return null};
const isDraw=b=>b[0].every(c=>c!==E);
const countThreats=(b,p)=>{let t=0;const ds=[[0,1],[1,0],[1,1],[1,-1]];for(let r=0;r<R;r++)for(let c=0;c<C;c++)for(const[dr,dc]of ds){const cs=[];for(let i=0;i<4;i++){const nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<R&&nc>=0&&nc<C)cs.push(b[nr][nc]);}if(cs.length===4&&cs.filter(x=>x===p).length===3&&cs.filter(x=>x===E).length===1)t++;}return t};
const findThreats=(b,p)=>{const threats=[];const ds=[[0,1],[1,0],[1,1],[1,-1]];for(let r=0;r<R;r++)for(let c=0;c<C;c++)for(const[dr,dc]of ds){const cs=[];for(let i=0;i<4;i++){const nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<R&&nc>=0&&nc<C)cs.push({r:nr,c:nc,v:b[nr][nc]});else break;}if(cs.length===4){const pc=cs.filter(x=>x.v===p).length,ec=cs.filter(x=>x.v===E).length;if(pc===3&&ec===1){const em=cs.find(x=>x.v===E);threats.push({r:em.r,c:em.c});}}}return threats};
const evaluate=b=>{if(checkWin(b,AI))return 1e5;if(checkWin(b,P))return-1e5;let s=0;for(let r=0;r<R;r++){if(b[r][3]===AI)s+=6;if(b[r][3]===P)s-=6;[2,4].forEach(c=>{if(b[r][c]===AI)s+=3;if(b[r][c]===P)s-=3;});}s+=countThreats(b,AI)*15-countThreats(b,P)*15;const ds=[[0,1],[1,0],[1,1],[1,-1]];for(let r=0;r<R;r++)for(let c=0;c<C;c++)for(const[dr,dc]of ds){const cs=[];for(let i=0;i<4;i++){const nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<R&&nc>=0&&nc<C)cs.push(b[nr][nc]);else break;}if(cs.length===4){const a=cs.filter(x=>x===AI).length,p2=cs.filter(x=>x===P).length;if(a>0&&p2===0)s+=[0,1,5,20][a];if(p2>0&&a===0)s-=[0,1,5,20][p2];}}return s};
const minimax=(b,d,a,bt,mx)=>{if(checkWin(b,AI))return{score:1e5+d};if(checkWin(b,P))return{score:-1e5-d};if(isDraw(b))return{score:0};if(d===0)return{score:evaluate(b)};const ms=validM(b).sort((a,b)=>Math.abs(3-a)-Math.abs(3-b));if(mx){let best={score:-Infinity,col:ms[0]};for(const c of ms){const r=minimax(drop(b,c,AI),d-1,a,bt,false);if(r.score>best.score)best={score:r.score,col:c};a=Math.max(a,r.score);if(bt<=a)break;}return best;}else{let best={score:Infinity,col:ms[0]};for(const c of ms){const r=minimax(drop(b,c,P),d-1,a,bt,true);if(r.score<best.score)best={score:r.score,col:c};bt=Math.min(bt,r.score);if(bt<=a)break;}return best;}};
const getAIMv=(b,diff)=>{const dp={beginner:2,intermediate:4,advanced:6,expert:8}[diff]||4;if(diff==='beginner'&&Math.random()<0.3){const ms=validM(b);for(const c of ms)if(checkWin(drop(b,c,AI),AI))return{col:c};for(const c of ms)if(checkWin(drop(b,c,P),P))return{col:c};return{col:ms[Math.floor(Math.random()*ms.length)]};}return minimax(b,dp,-Infinity,Infinity,true)};
const CONCEPTS=["Center column was stronger — it touches the most winning lines.","This created a new threat — good offensive play!","Blocking was critical here — the opponent would have won.","You missed a winning move! Always scan for wins first.","This gave your opponent a platform. Check what sits above your piece.","Good fork potential — building toward two threats.","Edge columns are low-value early. Prefer the prime zone (cols 2-6).","This move has correct parity — your threat lands on the right row type."];
const evalMove=(b,col,diff)=>{const dp=Math.min({beginner:4,intermediate:5,advanced:6,expert:7}[diff]||5,6);const ms=validM(b);const scores=ms.map(c=>{const nb=drop(b,c,P);const r=minimax(nb,dp,-Infinity,Infinity,true);return{col:c,score:-r.score}}).sort((a,b)=>b.score-a.score);const best=scores[0].score,ps=scores.find(m=>m.col===col)?.score??-Infinity,bestCol=scores[0].col,gp=best-ps;let tactical=null;for(const c of ms)if(checkWin(drop(b,c,P),P)&&c!==col)tactical=`Missed a winning move at column ${c+1}!`;if(!tactical)for(const c of ms)if(checkWin(drop(b,c,AI),AI)&&c!==col)tactical=`Column ${c+1} was needed to block a winning threat!`;let rating,color,emoji;if(gp<=2){rating="Optimal";color="#22c55e";emoji="✦";}else if(gp<=15){rating="Good";color="#84cc16";emoji="●";}else if(gp<=40){rating="Inaccuracy";color="#eab308";emoji="△";}else if(gp<=80){rating="Mistake";color="#f97316";emoji="■";}else{rating="Blunder";color="#ef4444";emoji="✕";}let concept="";if(tactical)concept=tactical.includes("winning")?"Always scan for immediate wins first.":"After checking your wins, always check opponent threats.";else if(bestCol===3&&col!==3)concept=CONCEPTS[0];else if(countThreats(drop(b,col,P),P)>countThreats(b,P))concept=CONCEPTS[1];else if(col<=1||col>=5)concept=CONCEPTS[6];else if(rating==="Optimal")concept="Strong play — maximizes threats while limiting opponent.";else concept=`Column ${bestCol+1} was better. `+(gp>40?"Significantly weakened your position.":"A small improvement exists.");return{rating,color,emoji,tactical,concept,bestCol,scores,explanation:tactical||concept,bestBoard:drop(b,bestCol,P)}};
const bb=(moves)=>{let b=mkB();for(const[c,p]of moves){b=drop(b,c,p)||b;}return b};

/* ═══ BOARD ═══ */
const Board=({board,onCol,winC,last,hintC,bestMoveCol,threats,hl,off,small,dropAnim})=>{
  const[hc,setHc]=useState(-1);const g=small?4:5;
  return (<div style={{maxWidth:small?300:380,width:'100%',margin:'0 auto'}}>
    {onCol&&<div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:g,marginBottom:3}}>{[0,1,2,3,4,5,6].map(c=>(<div key={c} className="chv" onClick={!off?()=>onCol(c):undefined} onMouseEnter={()=>setHc(c)} onMouseLeave={()=>setHc(-1)} style={{fontSize:small?9:11,color:off?'var(--t3)':hc===c?'var(--cyn)':'var(--t3)',opacity:off?.4:1,cursor:off?'default':'pointer'}}>{!off&&hc===c?'▼':c+1}</div>))}</div>}
    <div style={{background:'linear-gradient(145deg,#122448,#0a1a35)',borderRadius:small?10:14,padding:small?7:9,boxShadow:'0 4px 24px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.04)'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:g}}>{board.map((row,r)=>row.map((v,c)=>{
        const isW=winC?.some(([wr,wc])=>wr===r&&wc===c),isL=last&&last[0]===r&&last[1]===c,isH=hintC===c&&v===E&&dropR(board,c)===r,isBM=bestMoveCol===c&&v===E&&dropR(board,c)===r,isT=threats?.some(t=>t.r===r&&t.c===c)&&v===E,h=hl?.find(x=>x.r===r&&x.c===c);
        const cls=['cell'];if(v===P)cls.push('p');else if(v===AI)cls.push('ai');else cls.push('e');if(isW)cls.push('w');if(isL&&!isW){cls.push('lm');if(dropAnim)cls.push('drop');}if(isH)cls.push('hn');if(isBM&&!isH)cls.push('bm');if(isT)cls.push('th');
        const st=isL&&!isW&&dropAnim?{'--drop-rows':r+1,position:'relative'}:{position:'relative'};
        return (<div key={`${r}-${c}`} className={cls.join(' ')} onClick={onCol&&!off&&v===E?()=>onCol(c):undefined} style={st}>{h&&<div className="hlo" style={{borderColor:h.color}}/>}</div>);
      }))}</div>
    </div>
  </div>);
};

  const StrategyTab=()=>(<div className="fin" style={{display:'flex',flexDirection:'column',gap:10}}>{!strt?(<><p style={{fontSize:15,fontWeight:700,color:'var(--tx)'}}>Strategy Library</p><p style={{fontSize:11,color:'var(--t3)',marginTop:-6}}>12 lessons from solved game theory</p>{STRATS.map(s=>(<div key={s.id} className="cd cc" onClick={()=>{setStrt(s);setSs(0);}} style={{padding:'12px 14px'}}><div style={{display:'flex',alignItems:'center',gap:12}}><span style={{fontSize:22,width:30,textAlign:'center',color:s.color}}>{s.icon}</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:'var(--tx)'}}>{s.title}</div><div style={{fontSize:10,color:'var(--t3)',marginTop:1}}>{s.summary.slice(0,80)}…</div></div><span style={{fontSize:10,color:'var(--t3)',fontFamily:'var(--mn)'}}>{s.steps.length}→</span></div></div>))}</>):(<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%'}}><button className="bt bs bsm" onClick={()=>setStrt(null)}>← Back</button><span style={{fontSize:11,color:'var(--t3)',fontFamily:'var(--mn)'}}>Step {ss+1}/{strt.steps.length}</span></div><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:22,color:strt.color}}>{strt.icon}</span><p style={{fontSize:16,fontWeight:700,color:'var(--tx)'}}>{strt.title}</p></div><Board board={strt.steps[ss].board} hl={strt.steps[ss].hl} small/><div style={{padding:'12px 14px',borderRadius:11,background:'var(--sf)',border:'1px solid var(--bd)',width:'100%',maxHeight:160,overflowY:'auto'}}><p style={{fontSize:12,color:'var(--tx)',lineHeight:1.6}}>{strt.steps[ss].text}</p></div><div style={{display:'flex',gap:7,alignItems:'center'}}><button className="bt bs bsm" disabled={ss===0} onClick={()=>setSs(s=>s-1)} style={{opacity:ss===0?.3:1}}>← Prev</button><div style={{display:'flex',gap:4}}>{strt.steps.map((_,i)=>(<div key={i} onClick={()=>setSs(i)} style={{width:7,height:7,borderRadius:'50%',cursor:'pointer',transition:'all .15s',background:i===ss?strt.color:'rgba(255,255,255,.12)',transform:i===ss?'scale(1.3)':'scale(1)'}}/>))}</div><button className="bt bp bsm" disabled={ss===strt.steps.length-1} onClick={()=>setSs(s=>s+1)} style={{opacity:ss===strt.steps.length-1?.3:1}}>Next →</button></div><div className="pt" style={{width:'100%'}}><div className="pf" style={{width:`${((ss+1)/strt.steps.length)*100}%`,background:strt.color}}/></div></div>)}</div>);

  const getProgress=(lvl)=>{if(!CURRIC[lvl])return 0;let n=0;CURRIC[lvl].concepts.forEach((_,i)=>{if(cp.has(lvl+'-'+i))n++;});return n;};
  const toggleDone=(lvl,i)=>{const k=lvl+'-'+i;setCp(prev=>{const n=new Set(prev);if(n.has(k))n.delete(k);else n.add(k);return n;});};
  const handleTry=(c,col)=>{if(c.tryCol!==undefined&&col===c.tryCol)setTryRes('yes');else{setTryRes('no');setTimeout(()=>setTryRes(null),800);}};

  const CurriculumTab=()=>{if(!cl2){const tc=Object.values(CURRIC).reduce((a,v)=>a+v.concepts.length,0);return (<div className="fin" style={{display:'flex',flexDirection:'column',gap:12}}><div><p style={{fontSize:16,fontWeight:700,color:'var(--tx)'}}>Training Curriculum</p><p style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{tc} concepts · {cp.size} completed</p><div className="pt" style={{marginTop:6}}><div className="pf" style={{width:`${tc?Math.round(cp.size/tc*100):0}%`,background:'var(--cyn)'}}/></div></div>{Object.entries(CURRIC).map(([k,lv])=>{const pr=getProgress(k),pc=Math.round(pr/lv.concepts.length*100);return (<div key={k} className="cd cc" onClick={()=>{setCl(k);setOpenCon(-1);setTryRes(null);}} style={{padding:'14px'}}><div style={{display:'flex',alignItems:'center',gap:12}}><div style={{width:42,height:42,borderRadius:11,background:`${lv.color}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{lv.icon}</div><div style={{flex:1}}><div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:14,fontWeight:700,color:'var(--tx)'}}>{lv.title}</span><span style={{fontSize:13,fontWeight:800,color:lv.color,fontFamily:'var(--mn)'}}>{pc}%</span></div><div style={{fontSize:10,color:'var(--t3)',marginTop:1}}>{lv.concepts.length} concepts · {pr} done</div><div className="pt" style={{marginTop:5}}><div className="pf" style={{width:`${pc}%`,background:lv.color}}/></div></div></div></div>);})}</div>);}const lv=CURRIC[cl2];if(!lv)return (<div><button className="bt bs bsm" onClick={()=>setCl(null)}>← Back</button></div>);const pr=getProgress(cl2),pc=Math.round(pr/lv.concepts.length*100);return (<div className="fin" style={{display:'flex',flexDirection:'column',gap:10}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><button className="bt bs bsm" onClick={()=>{setCl(null);setOpenCon(-1);setTryRes(null);}}>← Back</button><div style={{display:'flex',alignItems:'center',gap:5}}><span style={{fontSize:16,color:lv.color}}>{lv.icon}</span><span style={{fontSize:14,fontWeight:700,color:'var(--tx)'}}>{lv.title}</span><span style={{fontSize:12,color:lv.color,fontWeight:700,fontFamily:'var(--mn)',marginLeft:4}}>{pc}%</span></div></div><div className="pt"><div className="pf" style={{width:`${pc}%`,background:lv.color}}/></div>{lv.concepts.map((c,i)=>{const dn=cp.has(cl2+'-'+i),isO=openCon===i;return (<div key={i} className="cd" style={{borderColor:isO?`${lv.color}33`:'var(--bd)'}}><div onClick={()=>{setOpenCon(isO?-1:i);setTryRes(null);}} style={{padding:'11px 13px',cursor:'pointer',display:'flex',alignItems:'center',gap:9,background:isO?`${lv.color}06`:'transparent',transition:'background .15s'}}><div onClick={e=>{e.stopPropagation();toggleDone(cl2,i);}} style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,background:dn?lv.color:'transparent',border:dn?'none':'2px solid var(--bd)',color:dn?'#000':'var(--t3)',transition:'all .15s'}}>{dn?'✓':i+1}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:dn?lv.color:'var(--tx)'}}>{c.name}</div>{!isO&&<div style={{fontSize:10,color:'var(--t3)',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.desc.slice(0,60)}…</div>}</div><span style={{color:'var(--t3)',fontSize:11,transform:isO?'rotate(180deg)':'rotate(0)',transition:'transform .15s',flexShrink:0}}>▼</span></div>{isO&&<div className="slu" style={{padding:'0 13px 13px'}}><p style={{fontSize:12,color:'var(--t2)',lineHeight:1.55,marginBottom:8}}>{c.desc}</p>{c.board&&<div style={{marginBottom:8}}><div style={{fontSize:9,fontWeight:600,color:lv.color,textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:4}}>{c.tryCol!==undefined?'Try it!':'Visual Demo'}</div><Board board={c.board} hl={c.hl} onCol={c.tryCol!==undefined&&tryRes!=='yes'?col=>handleTry(c,col):undefined} off={tryRes==='yes'} small/>{tryRes==='yes'&&<div className="bin" style={{marginTop:5,padding:'6px 10px',borderRadius:7,background:'rgba(34,197,94,.07)',border:'1px solid rgba(34,197,94,.15)',textAlign:'center'}}><span style={{fontSize:11,fontWeight:700,color:'var(--grn)'}}>✓ Correct!</span></div>}{tryRes==='no'&&<div style={{marginTop:5,padding:'6px 10px',borderRadius:7,background:'rgba(239,68,68,.07)',border:'1px solid rgba(239,68,68,.15)',textAlign:'center'}}><span style={{fontSize:11,fontWeight:700,color:'var(--red)'}}>Try again!</span></div>}{c.tip&&<p style={{fontSize:10,color:'var(--t3)',marginTop:5,lineHeight:1.4,fontStyle:'italic'}}>{c.tip}</p>}</div>}<div style={{padding:'7px 9px',borderRadius:7,background:'var(--sf)',border:'1px solid var(--bd)'}}><span style={{fontSize:9,fontWeight:700,color:lv.color}}>DRILL: </span><span style={{fontSize:10,color:'var(--t2)'}}>{c.drill}</span></div><div style={{display:'flex',gap:6,marginTop:7}}><button className="bt bp bsm" onClick={()=>setTab('play')} style={{fontSize:10}}>Practice →</button>{!dn&&<button className="bt bs bsm" onClick={()=>toggleDone(cl2,i)} style={{fontSize:10,borderColor:`${lv.color}33`,color:lv.color}}>Complete</button>}</div></div>}</div>);})}</div>);};

  const AnalysisTab=()=>{const rm=pg?pg.moves[ri]:null;return (<div className="fin" style={{display:'flex',flexDirection:'column',gap:10}}><p style={{fontSize:15,fontWeight:700,color:'var(--tx)'}}>Game Analysis</p>{!pg?(<div style={{textAlign:'center',padding:'32px 16px'}}><p style={{color:'var(--t3)',fontSize:13}}>Play a game first, {nm}.</p><button className="bt bp" style={{marginTop:12}} onClick={()=>setTab('play')}>Start a Game</button>{gameHist.length>0&&<div style={{marginTop:20,textAlign:'left'}}><div style={{fontSize:10,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:6}}>Recent Games ({gameHist.length})</div>{gameHist.slice(0,10).map((g,i)=>(<div key={i} className="cd" style={{padding:'9px 12px',marginBottom:3,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>{setPg(g);setRi(0);setAltCol(-1);}}><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:12,fontWeight:800,color:g.result==='win'?'var(--grn)':g.result==='loss'?'var(--red)':'var(--t3)'}}>{g.result==='win'?'W':g.result==='loss'?'L':'D'}</span><span style={{fontSize:11,color:'var(--t2)'}}>{g.total}mv · {g.diff}</span></div><span style={{fontSize:10,color:'var(--t3)',fontFamily:'var(--mn)'}}>{g.optimal}✦ {g.mistakes}✕</span></div>))}</div>}</div>):(
    <><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',borderRadius:10,background:pg.result==='win'?'rgba(34,197,94,.05)':pg.result==='loss'?'rgba(239,68,68,.05)':'rgba(148,163,184,.05)',border:`1px solid ${pg.result==='win'?'rgba(34,197,94,.15)':pg.result==='loss'?'rgba(239,68,68,.15)':'rgba(148,163,184,.1)'}`}}><span style={{fontSize:14,fontWeight:800,color:pg.result==='win'?'var(--grn)':pg.result==='loss'?'var(--red)':'var(--t2)'}}>{pg.result==='win'?'Victory':pg.result==='loss'?'Defeat':'Draw'}</span><div style={{display:'flex',gap:10}}>{[{v:pg.optimal,l:'Good',c:'var(--grn)'},{v:pg.inaccuracies,l:'Inacc',c:'var(--gld)'},{v:pg.mistakes,l:'Err',c:'var(--red)'}].map((x,i)=>(<div key={i} style={{textAlign:'center'}}><div style={{fontSize:15,fontWeight:800,color:x.c,fontFamily:'var(--mn)'}}>{x.v}</div><div style={{fontSize:8,color:'var(--t3)',textTransform:'uppercase'}}>{x.l}</div></div>))}</div></div>
    {ri>=0&&<div><div style={{fontSize:9,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:4}}>Replay — Move {ri+1}/{pg.moves.length}</div><Board board={altCol>=0&&altBoard?altBoard:rBoard} last={rm?[rm.row,rm.col]:null} winC={ri===pg.moves.length-1&&altCol<0?winC:null} small/>{rm?.eval&&altCol<0&&<div style={{marginTop:5,padding:'8px 11px',borderRadius:9,borderLeft:`3px solid ${rm.eval.color}`,background:'rgba(255,255,255,.02)'}}><span style={{fontSize:11,fontWeight:700,color:rm.eval.color}}>{rm.eval.emoji} {rm.eval.rating}</span><span style={{fontSize:10,color:'var(--t3)',marginLeft:6}}>{rm.eval.explanation}</span></div>}{rm?.eval&&<div style={{marginTop:4,fontSize:9,color:'var(--t3)'}}>Explore alternatives:<div style={{display:'flex',gap:3,marginTop:3}}>{[0,1,2,3,4,5,6].map(c=>(<div key={c} onClick={()=>setAltCol(altCol===c?-1:c)} style={{width:19,height:19,borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,fontFamily:'var(--mn)',cursor:'pointer',background:altCol===c?'var(--cyn)':c===rm.eval?.bestCol?'rgba(34,197,94,.15)':'var(--sf)',color:altCol===c?'#000':c===rm.eval?.bestCol?'var(--grn)':'var(--t3)',border:`1px solid ${c===rm.eval?.bestCol?'rgba(34,197,94,.25)':'var(--bd)'}`}}>{c+1}</div>))}</div></div>}<div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:5,marginTop:7}}><button className="bt bs bsm" onClick={()=>{setRi(0);setRp(false);setAltCol(-1);}}>⏮</button><button className="bt bs bsm" disabled={ri<=0} onClick={()=>{setRi(i=>Math.max(0,i-1));setRp(false);setAltCol(-1);}}>◀</button><button className="bt bp bsm" onClick={()=>{setRp(p=>!p);setAltCol(-1);}}>{rp?'⏸':'▶'}</button><button className="bt bs bsm" disabled={ri>=pg.moves.length-1} onClick={()=>{setRi(i=>Math.min(pg.moves.length-1,i+1));setRp(false);setAltCol(-1);}}>▶</button><button className="bt bs bsm" onClick={()=>{setRi(pg.moves.length-1);setRp(false);setAltCol(-1);}}>⏭</button></div><div style={{display:'flex',gap:2,marginTop:6,flexWrap:'wrap'}}>{pg.moves.map((m,i)=>(<div key={i} onClick={()=>{setRi(i);setRp(false);setAltCol(-1);}} style={{width:19,height:19,borderRadius:3,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,fontFamily:'var(--mn)',transition:'all .12s',background:i===ri?(m.eval?m.eval.color:'var(--cyn)'):(m.piece===P?'var(--rg)':'var(--gg)'),color:i===ri?'#000':(m.piece===P?'var(--red)':'var(--gld)'),border:m.eval&&(m.eval.rating==='Mistake'||m.eval.rating==='Blunder')?`1.5px solid ${m.eval.color}`:'1.5px solid transparent',transform:i===ri?'scale(1.1)':'scale(1)'}}>{i+1}</div>))}</div></div>}{ri<0&&<button className="bt bp" onClick={()=>{setRi(0);setAltCol(-1);}}>▶ Start Replay</button>}
    {pg.keyMoments.length>0&&<div><div style={{fontSize:9,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:4}}>Key Moments</div>{pg.keyMoments.map((km,i)=>(<div key={i} className="cd cc" onClick={()=>{setRi(km.idx);setRp(false);setAltCol(-1);}} style={{padding:'8px 11px',marginBottom:3,display:'flex',justifyContent:'space-between',alignItems:'center'}}><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{color:km.move.eval.color,fontSize:12,fontWeight:800,fontFamily:'var(--mn)'}}>{km.move.eval.emoji}</span><span style={{fontSize:11,color:'var(--tx)'}}>{km.label}</span></div><span style={{fontSize:10,color:'var(--t3)'}}>col {km.move.col+1}→{km.move.eval.bestCol+1}</span></div>))}</div>}
    <div><div style={{fontSize:9,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:4}}>Tips</div>{pg.tips.map((t,i)=>(<div key={i} style={{padding:'8px 11px',borderRadius:9,background:'var(--sf)',border:'1px solid var(--bd)',marginBottom:3}}><p style={{fontSize:11,color:'var(--t2)',lineHeight:1.5}}>{t}</p></div>))}</div>
    <button className="bt bs bsm" onClick={()=>{setPg(null);setRi(-1);setAltCol(-1);}}>← Back</button></>)}</div>);};

  return (<div style={{minHeight:'100vh',background:'var(--bg)',fontFamily:'var(--fn)',color:'var(--tx)',display:'flex',flexDirection:'column'}}><style>{css}</style>
    <div style={{padding:'9px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid var(--bd)',background:'linear-gradient(180deg,rgba(12,17,32,.97),var(--bg2))'}}>
      <div style={{display:'flex',alignItems:'center',gap:7}}><span style={{fontSize:12,letterSpacing:'3px'}}><span style={{color:'var(--red)'}}>●</span><span style={{color:'var(--gld)'}}>●</span></span><span style={{fontSize:13,fontWeight:800,color:'#fff'}}>C4 Coach</span><span style={{fontSize:8,fontWeight:600,color:'var(--cyn)',background:'rgba(6,182,212,.08)',padding:'2px 5px',borderRadius:3}}>AI</span></div>
      <div style={{display:'flex',alignItems:'center',gap:5}}><span style={{fontSize:10,color:'var(--t3)'}}>{nm}</span><div style={{width:24,height:24,borderRadius:7,background:'linear-gradient(135deg,var(--cyn),var(--prp))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:'#fff'}}>{nm[0].toUpperCase()}</div></div>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'12px 12px 80px'}}>{tab==='play'&&PlayTab()}{tab==='puzzles'&&PuzzlesTab()}{tab==='strategy'&&StrategyTab()}{tab==='curriculum'&&CurriculumTab()}{tab==='analysis'&&AnalysisTab()}</div>
    <div style={{position:'fixed',bottom:0,left:0,right:0,display:'flex',background:'linear-gradient(180deg,rgba(12,17,32,.95),rgba(6,9,18,.99))',borderTop:'1px solid var(--bd)',padding:'4px 6px 7px',backdropFilter:'blur(12px)',zIndex:100}}>{tabs.map(t=>(<button key={t.id} className={`tb ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}><span className="ti">{t.icon}</span><span>{t.l}</span></button>))}</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
